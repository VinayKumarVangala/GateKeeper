name: gatekeeper
version: "0.1"
description: "OpenEnv environment for AI-driven cybersecurity defense against DDoS and brute-force attacks."
entrypoint: env.gatekeeper_env:GatekeeperEnv
tasks:
  - id: task1_bruteforce
    name: "Brute Force Mitigation"
    description: "Detect and block a single-IP login-based brute force attack."
    grader: env.graders.task1_bruteforce:evaluate
  - id: task2_ddos
    name: "Volumetric DDoS"
    description: "Rate-limit a sudden burst of volumetric incoming requests."
    grader: env.graders.task2_ddos:evaluate
  - id: task3_multivector
    name: "Multi-Vector Attack"
    description: "Balance security vs. legitimate traffic under complex attack scenarios."
    grader: env.graders.task3_multivector:evaluate
